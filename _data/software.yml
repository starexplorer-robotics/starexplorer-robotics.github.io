modules:
  - name: Onboard control
    summary: The robot uses an onboard control stack to manage locomotion, sensor feeds, and general field operation.
  - name: Sensor integration
    summary: Camera, LiDAR, and IMU devices are integrated into one shared robot system for daily testing and competition preparation.
  - name: Remote operation
    summary: Operator tools remain available for observation, mode switching, and manual intervention whenever needed.
  - name: Task execution
    summary: The software stack supports competition tasks such as mobility, inspection, and touch without exposing internal implementation details on the public site.
