development_principles:
  - title: Reliability first
    description: Stable movement and safe operation matter more than showing every capability at once.
  - title: Hardware-led integration
    description: The public presentation centers on the robot platform, the arm, the sensors, and how they fit together in the field.
  - title: Operator fallback
    description: Steam Deck teleoperation stays available whenever manual intervention is safer than forcing the robot through a fragile rescue scene.
