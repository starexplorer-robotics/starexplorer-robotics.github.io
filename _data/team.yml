tagline: Rough-terrain rescue robotics built around a wheeled quadruped, a mounted arm, and a field-ready sensor package.
summary: Team Star Explorer builds a rescue robot around the Unitree Go2W, a mounted manipulator, and a compact sensor suite for RoboCup Rescue.
overview:
  - Team Star Explorer is a newly formed RoboCup Rescue team from the Robotics Center of ShanghaiTech University. The team is building a practical field robot for mobility, inspection, and touch tasks in rescue-style environments.
  - The current platform combines a wheeled quadruped, a D1-550 arm, several LiDAR and camera devices, and operator support tools. The public site focuses on the robot hardware, testing progress, and competition preparation.
