modules:
  - category: Mobility
    title: Unitree Go2W base
    summary: A wheeled quadruped base chosen for rough terrain, slope handling, and stable traversal in cluttered rescue environments.
    specs:
      - label: Speed
        value: 0 to 2.5 m/s
      - label: Payload
        value: 8 kg
      - label: Terrain target
        value: approx. 15 deg slopes
  - category: Manipulation
    title: D1-550 robotic arm
    summary: A 6 DoF arm mounted on the robot for inspection, touch tasks, QR capture, and HazMat interaction in constrained spaces.
    specs:
      - label: Reach
        value: 550 mm nominal, approx. 670 mm with gripper
      - label: Payload
        value: 0.5 kg
      - label: Control
        value: Ethernet plus onboard power
  - category: Main LiDAR
    title: Livox Mid-360
    summary: An onboard LiDAR used for scene awareness and stable operation in complex indoor and outdoor layouts.
    specs:
      - label: Role
        value: Scene awareness
      - label: Coverage
        value: Wide field of view with small blind zones
      - label: Mount
        value: On-robot sensor
  - category: Handheld scanner
    title: Handheld scanning rig
    summary: A handheld rig combining LiDAR, panoramic imaging, and IMU sensing for field documentation and setup support.
    specs:
      - label: LiDAR
        value: Hesai PandarQT
      - label: Vision
        value: Insta panoramic camera
      - label: IMU
        value: Xsens MTi-630R
  - category: Task perception
    title: Intel RealSense D435i
    summary: RGB-D sensing for close-range inspection, scene viewing, and arm-assisted task work.
    specs:
      - label: Role
        value: Task camera
      - label: Use
        value: Inspection and close-range observation
      - label: Mount
        value: Robot task view
  - category: Compute and teleop
    title: Orin NX plus Steam Deck
    summary: Jetson Orin NX handles the onboard robot stack, while Steam Deck provides a compact fallback interface for locomotion and arm teleoperation.
    specs:
      - label: Compute
        value: NVIDIA Orin NX 16 GB
      - label: Operator device
        value: Steam Deck
      - label: Fallback control
        value: Steam Deck profiles
